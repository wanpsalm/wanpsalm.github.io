<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catch My Heart | The Surprise</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ff4d6d',
                        secondary: '#ffccd5',
                        accent: '#fff0f3',
                        paper: '#fffef2',
                        wood: '#5d4037',
                        dark: '#4a3a3a'
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ffccd5;
            --accent: #fff0f3;
            --paper: #fffef2;
            --wood: #5d4037;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background: #fdfaf8; 
            color: var(--dark); 
            overflow-x: hidden; 
            width: 100%; 
        }

        .font-dancing { font-family: 'Dancing Script', cursive; }
        .font-signature { font-family: 'Great Vibes', cursive; text-transform: none; }

        /* --- LOGO ANIMATION --- */
        .logo-box { 
            width: 200px; 
            margin-top: -15px; 
            transition: width 0.3s ease; 
            flex-shrink: 0; 
        }
        .drawing-path { 
            stroke-dasharray: 1000; 
            stroke-dashoffset: 1000; 
            animation: drawLine 6s ease-out forwards; 
            filter: drop-shadow(0 0 4px rgba(255, 77, 109, 0.2)); 
        }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        /* --- EFFECTS --- */
        .grain-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03; pointer-events: none; z-index: 40;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .heart {
            position: fixed; bottom: -10%; user-select: none;
            pointer-events: none; z-index: 5; animation: float linear forwards;
        }

        /* --- GAME CUSTOM STYLES --- */
        @keyframes cheerBounce {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-15px) scale(1.1); }
        }
        .cheering { animation: cheerBounce 0.6s infinite alternate ease-in-out; }
        
        .polaroid-card {
            background: #ffffff;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.1);
            border: 1px solid rgba(0,0,0,0.02);
            border-radius: 8px;
        }

        #game-boundary {
            background: #ffffff;
            border: 2px dashed var(--secondary);
            box-shadow: inset 0 0 20px rgba(255, 77, 109, 0.05);
            border-radius: 20px;
        }

        /* --- NAVBAR & UI UTILS --- */
        .nav-wrapper { 
            display: flex; justify-content: space-between; align-items: center; 
            width: 100%; height: 100%; 
        }
        #music-toggle { 
            position: fixed; bottom: 25px; right: 25px; z-index: 1001; 
            background: white; border: 1px solid var(--secondary); width: 45px; height: 45px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 10px 20px rgba(255, 77, 109, 0.2); 
        }

        @media (max-width: 768px) {
            .logo-box { width: 140px; margin-top: -10px; }
            .polaroid-card { padding: 20px 15px; }
            #game-boundary { height: 350px !important; }
        }
    </style>
</head>
<body class="overflow-x-hidden antialiased">

    <div class="grain-overlay"></div>
    <div id="heart-bg" class="fixed inset-0 pointer-events-none z-0"></div>

    <audio id="bg-music" loop>
        <source src="/MUSIC/[선재 업고 튀어 (Lovely Runner) OST Part 8] 10CM - 봄눈 (Spring Snow) MV.mp3" type="audio/mpeg">
    </audio>
    <div id="music-toggle" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
    </div>

    <nav class="sticky top-0 bg-white/80 backdrop-blur-xl border-b border-gray-100 z-[1000] shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6 h-16 md:h-20 nav-wrapper">
            <div class="logo-box">
                <svg viewBox="0 0 180 60" class="font-signature w-full h-full">
                    <text x="0" y="45" fill="none" stroke="#ff4d6d" stroke-width="1.5" class="drawing-path text-3xl">Our Story</text>
                    <text id="final-text" x="0" y="45" fill="#ff4d6d" class="opacity-0 transition-opacity duration-1000 text-3xl">Our Story</text>
                </svg>
            </div>
            
            <div class="flex items-center gap-3 md:gap-8">
                <a href="../index.html" class="font-bold text-gray-400 border-b-2 border-transparent hover:text-primary hover:border-primary transition-all uppercase text-[9px] md:text-xs tracking-widest py-2">Timeline</a>
                <button onclick="window.location.href='/HTML/gallery.html?tab=photos'" class="font-bold text-gray-400 border-b-2 border-transparent hover:text-primary hover:border-primary transition-all uppercase text-[9px] md:text-xs tracking-widest py-2">Albums</button>
                <button onclick="window.location.href='/HTML/gallery.html?tab=videos'" class="font-bold text-gray-400 border-b-2 border-transparent hover:text-primary hover:border-primary transition-all uppercase text-[9px] md:text-xs tracking-widest py-2">Videos</button>
                
                <a href="/HTML/game.html" class="font-bold text-primary border-b-2 border-primary uppercase text-[9px] md:text-xs tracking-widest py-2 transition-all">Surprise</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12 md:py-16 relative z-10 text-center">
        <h2 id="game-title" class="font-dancing text-5xl md:text-6xl text-primary mb-2">TRY NGA HAHAHAHAHA. GALINGAN MO, LOVE!!!</h2>
        <div id="status-message" class="font-bold text-dark/50 mb-10 h-10 text-sm md:text-lg italic tracking-wide transition-all">
            Tignan natin kung kilala mo na ako 🤨
        </div>

        <div id="quiz-section" class="polaroid-card max-w-lg mx-auto">
            <p id="question-text" class="font-bold text-lg md:text-xl mb-8 text-dark"></p>
            <div id="answer-buttons" class="space-y-3"></div>
        </div>

        <div id="game-content" class="hidden">
            <div id="cheer-squad" class="flex justify-center gap-5 h-16 mb-6"></div>
            <div id="game-boundary" class="relative h-[400px] w-full max-w-xl mx-auto overflow-hidden">
                <div id="s1" class="absolute top-[20%] left-[15%] text-3xl cursor-pointer opacity-10 hover:opacity-100 transition-all duration-300" onclick="findReward(this, 'I Have This Bracelet For You')">📿</div>
                <div id="s2" class="absolute bottom-[25%] right-[20%] text-3xl cursor-pointer opacity-10 hover:opacity-100 transition-all duration-300" onclick="findReward(this, 'I Have This Make Up Bag For you')">👝</div>
            </div>
        </div>

        <div id="prize-reveal" class="hidden animate-in fade-in slide-in-from-bottom-8 duration-700 py-10">
            <h2 class="font-dancing text-5xl md:text-7xl text-primary mb-4">Nuksss, Galing!! 👏</h2>
            <p class="text-sm md:text-xl mb-10 text-dark/60">I HOPE NAGUSTUHAN AND MAGUSTUHAN MO RIN YUNG LAST 🤗</p>
            <a href="letter.html" class="inline-block bg-primary text-white px-8 md:px-12 py-3 md:py-4 rounded-full font-black uppercase tracking-widest text-[10px] md:text-sm hover:scale-105 transition-all shadow-xl shadow-primary/20">Open My Letter, Love →</a>
        </div>
    </main>

    <div id="secret-overlay" class="fixed inset-0 bg-white/90 backdrop-blur-md hidden items-center justify-center z-[10000]" onclick="closeSecret()">
        <div class="polaroid-card text-center max-w-xs mx-4" onclick="event.stopPropagation()">
            <p id="secret-text" class="font-bold text-lg mb-8 text-dark"></p>
            <button class="bg-primary text-white px-8 py-2 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-opacity-80 transition-colors" onclick="closeSecret()">Close</button>
        </div>
    </div>

    <div id="fail-overlay" class="fixed inset-0 bg-white/90 backdrop-blur-md hidden items-center justify-center z-[10000]">
        <div class="polaroid-card text-center max-w-sm mx-4 border-2 border-primary/20 shadow-2xl">
            <h3 class="font-dancing text-5xl text-primary mb-4">ANG BAGAL, HAYS 😜</h3>
            <p class="font-bold text-sm md:text-base mb-8 text-dark/80 leading-relaxed">
                <br>
                <span class="text-primary text-lg block mt-2">DAHIL DIYAN KISS MO MUNA AKO😘</span>
            </p>
            <button class="bg-primary text-white px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest hover:scale-105 transition-transform shadow-lg shadow-primary/30" onclick="retryLoveMeter()">OKAY NA NAKISS NA HAHAHA</button>
        </div>
    </div>

    <script>
        // Music Function
        const music = document.getElementById('bg-music');
        function toggleMusic() { music.paused ? music.play() : music.pause(); }

        // Game State
        const state = {
            quizComplete: false,
            rewardsFound: 0,
            requiredRewards: 2,
            chaseActive: false,
            tapCount: 0,
            tapsRequired: 40,
            timer: 10.0,
            timerInterval: null
        };

        const quizData = [
            { q: "Anong weird kong ginagawa sa iced drinks?", a: ["Tinutunaw yung yelo", "Hinahaluan ng mainit", "Kinakain yung yelo", "Wala lang"], correct: 2 },
            { q: "Saan tayo unang nag-date?", a: ["Sa Puso mo", "Christina's Cafe", "Coffee Shop", "Mixue"], correct: 1 },
            { q: "Favorite kong prutas?", a: ["Pakwan", "Strawberry", "Mangga", "Lahat ng nabanggit"], correct: 0 },
            { q: "Fastfood na madalas nagkakasundo para kainan?", a: ["Jollibee", "Mcdo", "Kfc", "Popeyes"], correct: 3 },
            { q: "Favorite color", a: ["Peach", "Brown", "Sky Blue", "Lahat ng nabanggit"], correct: 3 }
        ];

        let currentQ = 0;

        function initQuiz() {
            const qText = document.getElementById('question-text');
            const btnContainer = document.getElementById('answer-buttons');
            const data = quizData[currentQ];
            
            qText.innerText = data.q;
            btnContainer.innerHTML = '';

            data.a.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.innerText = choice;
                btn.className = 'w-full py-3 px-6 bg-accent text-dark font-bold rounded-xl hover:bg-primary hover:text-white transition-all text-xs md:text-sm uppercase tracking-wider border border-primary/10';
                btn.onclick = () => {
                    if (index === data.correct) {
                        currentQ++;
                        if (currentQ < quizData.length) initQuiz();
                        else completeQuiz();
                    } else {
                        updateStatus("Mali! Hays, Ano ba yan 😏");
                    }
                };
                btnContainer.appendChild(btn);
            });
        }

        function completeQuiz() {
            state.quizComplete = true;
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('game-content').classList.remove('hidden');
            updateStatus("Stage 2: Find the 2 hidden rewards in the box! 🔍");
        }

        function findReward(el, msg) {
            if (el.classList.contains('found')) return;
            el.classList.add('found');
            el.classList.add('cheering');
            el.style.opacity = "1";
            state.rewardsFound++;
            
            showSecret(msg);
            
            if (state.rewardsFound === state.requiredRewards) {
                startLoveMeterStage();
            } else {
                updateStatus(`Found ${state.rewardsFound}/${state.requiredRewards}. Keep looking!`);
            }
        }

        function startLoveMeterStage() {
            state.chaseActive = true;
            state.tapCount = 0;
            state.timer = 5.0;

            updateStatus("FINAL STAGE: Punuin mo yung Love Meter in 10 seconds! TAP FAST! ❤️");
            
            const squad = document.getElementById('cheer-squad');
            const s1 = document.getElementById('s1');
            const s2 = document.getElementById('s2');

            [s1, s2].forEach(s => {
                if(s) {
                    s.className = "relative text-4xl cheering";
                    squad.appendChild(s);
                }
            });

            const boundary = document.getElementById('game-boundary');
            
            // Build the Love Meter UI
            boundary.innerHTML = `
                <div class="absolute top-8 left-1/2 -translate-x-1/2 w-4/5 max-w-sm h-6 bg-gray-100 rounded-full overflow-hidden shadow-inner border border-gray-200">
                    <div id="love-meter-bar" class="h-full bg-primary w-0 transition-all duration-75 relative">
                        <div class="absolute inset-0 bg-white/20 w-full h-full animate-pulse"></div>
                    </div>
                </div>
                <div id="timer-text" class="absolute top-16 left-1/2 -translate-x-1/2 font-bold text-2xl text-primary font-dancing">10.0s</div>
                
                <div id="giant-heart" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[100px] md:text-[120px] cursor-pointer select-none transition-transform duration-75 active:scale-90 touch-manipulation" style="-webkit-tap-highlight-color: transparent;">
                    ❤️
                </div>
            `;

            const giantHeart = document.getElementById('giant-heart');
            
            // Mobile and Desktop friendly tap events
            giantHeart.addEventListener('touchstart', (e) => {
                e.preventDefault(); // Prevents double tap zooming on phones
                handleHeartTap();
            }, {passive: false});
            
            giantHeart.addEventListener('mousedown', (e) => {
                handleHeartTap();
            });

            clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                state.timer -= 0.1;
                if (state.timer < 0) state.timer = 0; // Prevent negative numbers
                document.getElementById('timer-text').innerText = state.timer.toFixed(1) + 's';
                
                if (state.timer <= 0) {
                    clearInterval(state.timerInterval);
                    document.getElementById('timer-text').innerText = '0.0s';
                    
                    if (state.tapCount < state.tapsRequired) {
                        updateStatus("Oh no! Naubusan ka ng oras! 🤪");
                        showFailOverlay(); // Show the consequence!
                    }
                }
            }, 100);
        }

        function handleHeartTap() {
            if(state.timer <= 0 || state.tapCount >= state.tapsRequired) return;
            
            state.tapCount++;
            const progress = Math.min((state.tapCount / state.tapsRequired) * 100, 100);
            document.getElementById('love-meter-bar').style.width = progress + '%';
            
            // Make the heart pulse slightly with each tap
            const heart = document.getElementById('giant-heart');
            heart.style.transform = `translate(-50%, -50%) scale(${1 + (progress/300)})`;
            
            if (state.tapCount >= state.tapsRequired) {
                clearInterval(state.timerInterval);
                document.getElementById('timer-text').innerText = "FULL!";
                setTimeout(revealPrize, 600);
            }
        }

        function revealPrize() {
            document.getElementById('game-content').classList.add('hidden');
            document.getElementById('status-message').classList.add('hidden');
            document.getElementById('game-title').innerText = "Mission Accomplished";
            document.getElementById('prize-reveal').classList.remove('hidden');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function updateStatus(msg) { 
            document.getElementById('status-message').innerText = msg; 
        }

        function showSecret(msg) { 
            document.getElementById('secret-text').innerText = msg; 
            document.getElementById('secret-overlay').classList.replace('hidden', 'flex'); 
        }

        function closeSecret() { 
            document.getElementById('secret-overlay').classList.replace('flex', 'hidden'); 
        }

        // Penalty Logic
        function showFailOverlay() {
            document.getElementById('fail-overlay').classList.replace('hidden', 'flex');
        }

        function retryLoveMeter() {
            document.getElementById('fail-overlay').classList.replace('flex', 'hidden');
            startLoveMeterStage(); // Reset and start the timer again
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = ['❤️', '💖', '🌸', '✨'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 15 + 15 + "px";
            heart.style.animationDuration = (Math.random() * 5 + 5) + "s";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 10000);
        }

        setInterval(createHeart, 600);

        window.onload = () => {
            initQuiz();
            setTimeout(() => {
                const finalText = document.getElementById('final-text');
                if (finalText) finalText.classList.replace('opacity-0', 'opacity-100');
            }, 5500);
        };
    </script>
</body>
</html>
