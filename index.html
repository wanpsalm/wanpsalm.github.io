<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4d6d; --secondary: #ffccd5; --bg: #fffcf9; --text: #594157; }
        
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* Floating Hearts Background */
        .background-hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .heart { position: absolute; color: var(--secondary); font-size: 20px; animation: float 10s linear infinite; opacity: 0.6; }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Navigation */
        nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 20px; display: flex; justify-content: center; gap: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        nav a { text-decoration: none; color: var(--text); font-weight: 500; transition: 0.3s; font-size: 1.1rem; }
        nav a:hover { color: var(--primary); }
        .active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* Gallery Wrapper */
        .gallery-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            padding: 60px 20px;
            max-width: 1200px;
            margin: auto;
            transition: 0.5s ease;
        }

        /* Folder Logic */
        .folder-container {
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 300px;
            text-align: center;
        }

        /* Hide others when one is open */
        .has-open-folder .folder-container:not(.is-open) { display: none; }
        .folder-container.is-open { width: 100%; cursor: default; }

        .folder-title {
            font-family: 'Dancing Script', cursive;
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        /* The Stack (Closed State) */
        .folder-content { position: relative; min-height: 350px; transition: 0.5s; }
        .folder-container:not(.is-open) .folder-content { cursor: pointer; }

        .card {
            background: white;
            padding: 12px 12px 35px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 2px;
        }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* Initial Stack Look */
        .folder-container:not(.is-open) .card {
            position: absolute;
            width: 200px;
            left: 50%;
            margin-left: -100px;
            pointer-events: none;
        }
        .folder-container:not(.is-open) .card:nth-child(1) { transform: rotate(-5deg); z-index: 5; opacity: 1; }
        .folder-container:not(.is-open) .card:nth-child(2) { transform: rotate(4deg); z-index: 4; opacity: 1; }
        .folder-container:not(.is-open) .card:nth-child(n+3) { opacity: 0; }

        /* Hover on Stack */
        .folder-container:not(.is-open):hover .card:nth-child(1) { transform: rotate(0deg) translateY(-20px); }

        /* Spread Look (Open State) */
        .folder-container.is-open .folder-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            height: auto;
        }
        .folder-container.is-open .card {
            position: relative;
            width: auto;
            left: 0;
            margin-left: 0;
            opacity: 1;
            pointer-events: auto;
            cursor: zoom-in;
        }

#back-btn {
    display: none; /* Default hidden */
    position: fixed !important;
    top: 35px !important;
    right: 25px !important;
    z-index: 99999 !important;
    
    /* Glassmorphism Effect */
    background: rgba(255, 77, 109, 0.85) !important;
    backdrop-filter: blur(8px) !important;
    -webkit-backdrop-filter: blur(8px) !important;
    
    color: white !important;
    padding: 12px 28px !important;
    border-radius: 75px !important;
    border: 2px solid rgba(255, 255, 255, 0.5) !important;
    cursor: pointer !important;
    
    font-family: 'Quicksand', sans-serif !important;
    font-weight: 700 !important;
    font-size: 0.9rem !important;
    text-transform: uppercase;
    
    box-shadow: 0 8px 32px rgba(255, 77, 109, 0.3) !important;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
    
    /* Soft Pulse Animation */
    animation: buttonPulse 2s infinite;
}

/* Hover effects */
#back-btn:hover {
    transform: scale(1.05) translateY(-2px) !important;
    background: rgba(255, 77, 109, 1) !important;
    box-shadow: 0 12px 40px rgba(255, 77, 109, 0.5) !important;
}

#back-btn:active {
    transform: scale(0.95) !important;
}

/* Pulse Animation Logic */
@keyframes buttonPulse {
    0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.4); }
    70% { box-shadow: 0 0 0 15px rgba(255, 77, 109, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
}

/* Trigger Visibility */
.has-open-folder #back-btn {
    display: flex !important;
    align-items: center;
    gap: 8px;
}

/* Palitan ang dating ".has-open-folder #back-btn" nito: */
.has-open-folder ~ #back-btn, 
#main-wrapper.has-open-folder ~ #back-btn,
body:has(.is-open) #back-btn {
    display: block !important;
}
        /* Music & Lightbox */
        #music-control { position: fixed; bottom: 30px; right: 30px; z-index: 2000; background: var(--primary); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #lightbox { display: none; position: fixed; z-index: 3000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        #lightbox img { max-width: 90%; max-height: 80%; border: 8px solid white; transform: scale(0.8); transition: 0.3s; }
        #lightbox.active { display: flex; }
        #lightbox.active img { transform: scale(1); }
    </style>
</head>

    <script>
        function openFolder(id) {
    const wrapper = document.getElementById('main-wrapper');
    const target = document.getElementById('folder-' + id);
    
    // Tanggalin muna ang 'is-open' sa lahat para malinis
    document.querySelectorAll('.folder-container').forEach(f => f.classList.remove('is-open'));
    
    // Buksan ang target album
    target.classList.add('is-open');
    
    // Eto ang magpapa-trigger sa CSS para lumabas ang Back Button
    wrapper.classList.add('has-open-folder'); 
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeAllFolders() {
    const wrapper = document.getElementById('main-wrapper');
    
    // Tanggalin ang 'is-open' sa lahat ng folders
    document.querySelectorAll('.folder-container').forEach(f => f.classList.remove('is-open'));
    
    // Tanggalin ang 'has-open-folder' para magtago ang Back Button at lumabas ulit yung 3 albums
    wrapper.classList.remove('has-open-folder');
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
        function openLightbox(e, src) {
            e.stopPropagation(); // Prevents folder closing/opening
            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = src;
            lb.classList.add('active');
        }

        function toggleMusic() {
            const m = document.getElementById('bg-music');
            const i = document.getElementById('music-icon');
            if (m.paused) { m.play(); i.innerHTML = '❤️'; }
            else { m.pause(); i.innerHTML = '🎵'; }
        }

        // Heart Logic
        const container = document.getElementById('heart-container');
        setInterval(() => {
            const h = document.createElement('div');
            h.classList.add('heart');
            h.innerHTML = ['❤️', '💖', '✨'][Math.floor(Math.random()*3)];
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (Math.random()*5 + 5) + 's';
            container.appendChild(h);
            setTimeout(() => h.remove(), 10000);
        }, 600);
    </script>
