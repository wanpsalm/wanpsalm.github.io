<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories | Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff4d6d; 
            --secondary: #ffccd5; 
            --bg: #fffcf9; 
            --text: #594157; 
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        
        * { box-sizing: border-box; }
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            min-height: 100vh;
        }

        .background-hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .heart { position: absolute; color: var(--secondary); font-size: 20px; animation: float 10s linear infinite; opacity: 0.6; }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Navigation */
        nav { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            padding: 15px; 
            text-align: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .nav-title { font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: var(--primary); margin: 0 0 10px 0; }
        
        .tabs { display: flex; justify-content: center; gap: 25px; }
        .tab-btn { 
            background: none; border: none; font-family: 'Quicksand', sans-serif; 
            font-size: 1rem; font-weight: 700; color: var(--text); cursor: pointer; 
            padding: 5px 10px; transition: 0.3s; text-transform: uppercase;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* Main Container */
        .main-container { max-width: 1300px; margin: auto; padding: 40px 20px; min-height: 80vh; }
        .tab-content { display: none; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Photo Deck Logic */
        .photo-wrapper { display: flex; flex-wrap: wrap; justify-content: center; gap: 60px; }
        .folder-container { width: 350px; text-align: center; cursor: pointer; transition: 0.4s; }
        .folder-title { font-family: 'Dancing Script', cursive; color: var(--primary); font-size: 2.5rem; margin-bottom: 25px; }

        .card-deck { position: relative; width: 280px; height: 350px; margin: auto; }
        .card { 
            position: absolute; width: 100%; height: 100%; background: var(--white); 
            padding: 15px 15px 45px; box-shadow: var(--shadow); 
            border-radius: 2px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        /* Stacked State */
        .folder-container:not(.is-open) .card:nth-child(1) { transform: rotate(-5deg); z-index: 5; }
        .folder-container:not(.is-open) .card:nth-child(2) { transform: rotate(5deg); z-index: 4; }
        .folder-container:not(.is-open) .card:nth-child(n+3) { display: none; }
        .folder-container:not(.is-open):hover .card:nth-child(1) { transform: rotate(0deg) translateY(-20px); }

        /* Open State (3 Cards per row desktop) */
        .has-open-folder .folder-container:not(.is-open) { display: none; }
        .folder-container.is-open { width: 100%; cursor: default; }
        .folder-container.is-open .card-deck { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 40px; width: 100%; height: auto; position: static; 
        }
        .folder-container.is-open .card { 
            position: relative; transform: none !important; opacity: 1; cursor: zoom-in; 
            height: 450px; /* Bigger height when opened */
        }

        /* Video Grid */
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; 
        }
        .video-card { background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); transition: 0.3s; }
        .video-card:hover { transform: translateY(-5px); }
        .video-card video { width: 100%; height: 500px; object-fit: cover; border-radius: 8px; cursor: pointer; }

        /* Controls */
        #back-btn { 
            display: none; position: fixed; top: 120px; left: 50%; transform: translateX(-50%); z-index: 9999;
            background: var(--primary); color: white; border: none; padding: 12px 35px; 
            border-radius: 50px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 20px rgba(255, 77, 109, 0.4);
        }
        .has-open-folder #back-btn { display: block; }

        #music-control { position: fixed; bottom: 30px; right: 30px; z-index: 2000; background: var(--primary); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* FIXED LIGHTBOX - Background and Centering */
#lightbox { 
    display: none; 
    position: fixed; 
    z-index: 10000; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background: rgba(0,0,0,0.92); 
    justify-content: center; 
    align-items: center; 
    backdrop-filter: blur(8px); 
    padding: 20px;
}

/* The Polaroid Frame - Fixed Size for Consistency */
#lightbox-content {
    background: white;
    padding: 15px 15px 60px; /* Thicker bottom for the Polaroid look */
    width: 400px;  /* Fixed width to keep all photos the same size */
    height: 500px; /* Fixed height for uniformity */
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    border-radius: 3px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    animation: zoomIn 0.3s ease-out;
}

#lightbox img, #lightbox video { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; /* Ensures any image fills the frame properly */
    display: block;
}

/* Optional: Animation for a professional feel */
@keyframes zoomIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

/* Responsive adjustment for Mobile so it doesn't overflow */
@media (max-width: 450px) {
    #lightbox-content {
        width: 90vw;
        height: 110vw;
        padding: 10px 10px 40px;
    }
}


        @media (max-width: 1024px) {
            .folder-container.is-open .card-deck { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
    /* Pinanatiling 3 cards per row para sa professional look sa mobile */
    .folder-container.is-open .card-deck { 
        grid-template-columns: repeat(3, 1fr) !important; 
        gap: 10px; /* Mas maliit na gap para kumasya sa maliit na screen */
        padding: 0 5px;
    }

    /* In-adjust ang height ng card para hindi magmukhang masyadong mahaba */
    .folder-container.is-open .card { 
        height: 180px; 
        padding: 5px 5px 25px; /* Mas maliit na padding para sa mobile polaroid */
    }

    /* Fixed visibility para sa Back Button */
    #back-btn { 
        top: 100px; 
        width: 90%; 
        font-size: 0.8rem;
        padding: 10px;
    }

    /* Video grid ay mananatiling 1 o 2 para sa better viewing */
    .video-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .video-card video { height: 250px; }
}
    </style>
</head>
<body>

    <div class="background-hearts" id="heart-container"></div>
    
    <nav>
        <h1 class="nav-title">Albums</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'photos')">Photos</button>
            <button class="tab-btn" onclick="switchTab(event, 'videos')">Videos</button>
        </div>
    </nav>

    <button id="back-btn" onclick="closeFolder()">← BACK TO ALBUMS</button>

    <div class="main-container" id="main-wrapper">
        <div id="photos-tab" class="tab-content active">
            <div class="photo-wrapper">
                <div class="folder-container" id="folder-us" onclick="openFolder('us')">
                    <h2 class="folder-title">US</h2>
                    <div class="card-deck" id="deck-us">
                        <div class="card"><img src="/US/1.jpg"></div>
                        <div class="card"><img src="/US/2.jpg"></div>
                    </div>
                </div>
                <div class="folder-container" id="folder-foods" onclick="openFolder('foods')">
                    <h2 class="folder-title">FOODS</h2>
                    <div class="card-deck" id="deck-foods">
                        <div class="card"><img src="/FOODS/1.jpg"></div>
                        <div class="card"><img src="/FOODS/2.jpg"></div>
                    </div>
                </div>
                <div class="folder-container" id="folder-yours" onclick="openFolder('yours')">
                    <h2 class="folder-title">YOURS</h2>
                    <div class="card-deck" id="deck-yours">
                        <div class="card"><img src="/YOURS/1.jpg"></div>
                        <div class="card"><img src="/YOURS/2.jpg"></div>
                    </div>
                </div>
                <div class="folder-container" id="folder-wfriends" onclick="openFolder('wfriends')">
                    <h2 class="folder-title">WFRIENDS</h2>
                    <div class="card-deck" id="deck-wfriends">
                        <div class="card"><img src="/WFRIENDS/1.jpg"></div>
                        <div class="card"><img src="/WFRIENDS/2.jpg"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="videos-tab" class="tab-content">
            <div class="video-grid">
                <div class="video-card" onclick="openLightbox('VIDEOS/1.mp4')">
                    <video src="VIDEOS/1.mp4" muted loop autoplay playsinline></video>
                </div>
                <div class="video-card" onclick="openLightbox('VIDEOS/2.mp4')">
                    <video src="VIDEOS/2.mp4" muted loop autoplay playsinline></video>
                </div>
                <div class="video-card" onclick="openLightbox('VIDEOS/3.mp4')">
                    <video src="VIDEOS/3.mp4" muted loop autoplay playsinline></video>
                </div>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop><source src="/MUSIC/[선재 업고 튀어 (Lovely Runner) OST Part 8] 10CM - 봄눈 (Spring Snow) MV.mp3" type="audio/mpeg"></audio>
    <div id="music-control" onclick="toggleMusic()">🎵</div>

    <div id="lightbox" onclick="this.style.display='none'">
        <div id="lightbox-content" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        const counts = { us: 174, foods: 5, wfriends: 16, yours: 110 };

        function switchTab(event, tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
            closeFolder();
        }

        function openFolder(id) {
            const wrapper = document.getElementById('main-wrapper');
            const folder = document.getElementById('folder-' + id);
            const deck = folder.querySelector('.card-deck');
            if(folder.classList.contains('is-open')) return;
            wrapper.classList.add('has-open-folder');
            folder.classList.add('is-open');

            let imagesHTML = '';
            const pathPrefix = id === 'wfriends' ? 'WFRIENDS' : id.toUpperCase();
            for(let i=1; i <= counts[id]; i++) {
                const src = `/${pathPrefix}/${i}.jpg`;
                imagesHTML += `<div class="card" onclick="openLightbox('${src}')"><img src="${src}" loading="lazy"></div>`;
            }
            deck.innerHTML = imagesHTML;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeFolder() {
            const wrapper = document.getElementById('main-wrapper');
            wrapper.classList.remove('has-open-folder');
            document.querySelectorAll('.folder-container').forEach(f => {
                if(!f.classList.contains('is-open')) return;
                f.classList.remove('is-open');
                const id = f.id.replace('folder-', '');
                const prefix = id === 'wfriends' ? 'WFRIENDS' : id.toUpperCase();
                f.querySelector('.card-deck').innerHTML = `<div class="card"><img src="/${prefix}/1.jpg"></div><div class="card"><img src="/${prefix}/2.jpg"></div>`;
            });
        }
        


        function openLightbox(src) {
    const lb = document.getElementById('lightbox');
    const content = document.getElementById('lightbox-content');
    lb.style.display = 'flex';
    
    // Checks if it's a video or image and keeps them in the same Polaroid frame
    if(src.endsWith('.mp4')) {
        content.innerHTML = `<video src="${src}" controls autoplay loop></video>`;
    } else {
        content.innerHTML = `<img src="${src}" alt="Memory View">`;
    }
}

        function toggleMusic() {
            const m = document.getElementById('bg-music');
            m.paused ? m.play().catch(()=>{}) : m.pause();
        }

        setInterval(() => {
            const h = document.createElement('div');
            h.classList.add('heart'); h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            document.getElementById('heart-container').appendChild(h);
            setTimeout(() => h.remove(), 10000);
        }, 1000);

        document.addEventListener('click', () => {
            const m = document.getElementById('bg-music');
            if(m.paused) m.play().catch(()=>{});
        }, { once: true });
    </script>
</body>
</html>
