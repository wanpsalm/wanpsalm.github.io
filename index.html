<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Story | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #fdfaf8; color: #4a3a3a; }
        .font-dancing { font-family: 'Dancing Script', cursive; }
        .font-signature { font-family: 'Great Vibes', cursive; text-transform: none; }

        /* 1. Subtle Grain Overlay */
        .grain-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03; pointer-events: none; z-index: 40;
        }

        /* 2. Drawing Animation for the Logo */
        .drawing-path {
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawLine 6s ease-out forwards;
            filter: drop-shadow(0 0 4px rgba(255, 77, 109, 0.2));
        }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        /* 3. Floating Hearts */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .heart {
            position: fixed; bottom: -10%; user-select: none;
            pointer-events: none; z-index: 5; animation: float linear forwards;
        }

        /* 4. Responsive Nav Scaling */
        .nav-wrapper { display: flex; justify-content: space-between; align-items: center; width: 100%; height: 100%; }
        .logo-box { width: 160px; transition: width 0.3s ease; flex-shrink: 0; }

        @media (max-width: 768px) {
            .logo-box { width: 150px; margin-top: -10px;}
            .nav-link-item { font-size: 11px !important; padding: 0 4px !important; margin: 0 3px !important;}
            .btn-surprise { padding: 8px 12px !important; font-size: 10px !important; margin-left: -10px !important; }
        }

        /* 5. RESTORED DASHED TIMELINE UI */
        .timeline-dot {
            position: absolute;
            left: -9px;
            top: 0.25rem;
            width: 1rem;
            height: 1rem;
            background-color: #ff4d6d;
            border-radius: 9999px;
            transition: transform 0.3s;
            box-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
            z-index: 10;
        }

        .timeline-card {
            position: relative;
            padding-left: 2rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .timeline-card:hover .timeline-dot { transform: scale(1.5); }

        .timeline-content-box {
            background: white;
            padding: 1.25rem;
            border-radius: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid rgba(255, 204, 213, 0.4);
            transition: all 0.3s ease;
        }

        .timeline-card:hover .timeline-content-box {
            border-color: #ff4d6d;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.1);
            transform: translateX(5px);
        }

        /* 6. NOSTALGIC MODAL & CENTERED DECK */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(42, 34, 34, 0.85);
            backdrop-filter: blur(12px);
            z-index: 5000;
            display: none;
            align-items: center; justify-content: center;
            padding: 20px;
        }

        .modal-card {
            background: white;
            max-width: 650px; width: 100%;
            max-height: 90vh; overflow-y: auto;
            border-radius: 12px;
            padding: 50px 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            border: 1px solid #e5dace;
            position: relative;
        }

        .photo-deck {
            position: relative; height: 380px; margin-bottom: 50px;
            display: grid; place-content: center;
        }

        .deck-photo {
            grid-area: 1 / 1; width: 200px; height: 250px; background: #fff;
            padding: 10px 10px 35px 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid #eee; transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            opacity: 0; transform: scale(0.8) translateY(20px);
        }

        .deck-photo img { width: 100%; height: 180px; object-fit: cover; filter: sepia(5%) contrast(105%); }

        .fan-active .deck-photo { opacity: 1; }
        .fan-active .deck-photo:nth-child(1) { transform: translate(-110px, -15px) rotate(-15deg); }
        .fan-active .deck-photo:nth-child(2) { transform: translate(-55px, 5px) rotate(-8deg); }
        .fan-active .deck-photo:nth-child(3) { transform: translate(0px, -10px) rotate(2deg) scale(1.05); z-index: 50; }
        .fan-active .deck-photo:nth-child(4) { transform: translate(55px, 8px) rotate(10deg); }
        .fan-active .deck-photo:nth-child(5) { transform: translate(110px, -12px) rotate(18deg); }

        #modal-content p { text-align: justify; text-indent: 40px; line-height: 1.8; margin-bottom: 1.5rem; color: #5d4d4d; }
        #modal-content p::first-letter { font-family: 'Great Vibes', cursive; font-size: 2.5rem; color: #ff4d6d; float: left; margin-right: 8px; line-height: 1; }

        /* Music Floating Toggle */
        #music-toggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1001;
            background: white;
            border: 1px solid #ffccd5;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.2);
            transition: all 0.3s ease;
        }

        @media (max-width: 640px) {
            .photo-deck { height: 280px; }
            .deck-photo { width: 140px; height: 180px; }
            .fan-active .deck-photo:nth-child(1) { transform: translate(-65px, -10px) rotate(-12deg); }
            .fan-active .deck-photo:nth-child(2) { transform: translate(-35px, 3px) rotate(-6deg); }
            .fan-active .deck-photo:nth-child(4) { transform: translate(35px, 5px) rotate(6deg); }
            .fan-active .deck-photo:nth-child(5) { transform: translate(65px, -8px) rotate(12deg); }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#ff4d6d', secondary: '#ffccd5', accent: '#fff0f3', dark: '#4a3a3a' }
                }
            }
        }
    </script>
</head>
<body class="overflow-x-hidden antialiased">

    <div class="grain-overlay"></div>
    <div id="heart-bg" class="fixed inset-0 pointer-events-none z-0"></div>

    <audio id="bg-music" loop>
        <source src="/MUSIC/Over October - Intertwine (Official Lyric Video) ft. The Ridleys.mp3" type="audio/mpeg">
    </audio>

    <div id="music-toggle" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
    </div>

    <nav class="sticky top-0 bg-white/70 backdrop-blur-xl border-b border-gray-100 z-[1000] shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6 h-16 md:h-20 nav-wrapper">
            <div class="logo-box">
                <svg viewBox="0 0 180 60" class="font-signature w-full h-full">
                    <text x="0" y="45" fill="none" stroke="#ff4d6d" stroke-width="1.5" class="drawing-path text-3xl">Our Story</text>
                    <text id="final-text" x="0" y="45" fill="#ff4d6d" class="opacity-0 transition-opacity duration-1000 text-3xl">Our Story</text>
                </svg>
            </div>
            <div class="flex items-center gap-6 md:gap-8">
                <a href="index.html" class="nav-link-item font-bold text-primary border-b-2 border-primary uppercase text-xs tracking-widest">Timeline</a>
                <div class="relative group">
                    <button class="nav-link-item font-bold text-gray-400 hover:text-primary transition-all uppercase text-xs tracking-widest py-2">Albums ▾</button>
                    <div class="absolute left-1/2 -translate-x-1/2 hidden group-hover:block bg-white shadow-xl rounded-xl p-2 min-w-[160px] animate-in fade-in slide-in-from-top-2 border border-gray-50">
                        <button onclick="goToGallery('photos')" class="w-full text-left px-4 py-2 hover:bg-accent rounded-lg transition-colors text-xs font-bold uppercase text-dark/70">📸 Photos</button>
                        <button onclick="goToGallery('videos')" class="w-full text-left px-4 py-2 hover:bg-accent rounded-lg transition-colors text-xs font-bold uppercase text-dark/70">🎥 Videos</button>
                    </div>
                </div>
                <a href="/HTML/game.html" class="btn-surprise bg-primary text-white px-5 py-2.5 rounded-full text-xs font-black uppercase tracking-widest shadow-sm">The Surprise</a>
            </div>
        </div>
    </nav>

    <header class="relative h-[70vh] flex items-center justify-center text-center overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center transition-transform duration-[15s] hover:scale-110" 
             style="background-image: linear-gradient(rgba(253, 250, 248, 0.4), rgba(253, 250, 248, 0.8)), url('https://images.unsplash.com/photo-1518562180175-34a163b159c1?q=80&w=2070');">
        </div>
        <div class="relative z-10 px-4 mt-10">
            <h1 class="font-dancing text-5xl md:text-8xl text-primary drop-shadow-md animate-bounce">Happy Monthsary, My Love.</h1>
            <div class="h-1 w-24 bg-primary/20 mx-auto mt-6 rounded-full"></div>
            <p class="mt-6 text-sm font-bold tracking-[0.3em] uppercase text-dark/60">YOU'RE ONE OF THE GREATEST PLOT IN MY LIFE</p>
        </div>
    </header>

    <section class="max-w-4xl mx-auto px-6 py-24 relative z-10">
        <div class="text-center mb-16">
            <h2 class="font-dancing text-6xl text-primary mb-4">Our Chapters</h2>
            <div class="w-24 h-1 bg-secondary/40 mx-auto rounded-full"></div>
        </div>

        <div class="relative border-l-2 border-dashed border-primary/40 ml-6 md:ml-0 md:mx-auto max-w-lg space-y-12">
            
            <div class="timeline-card" onclick="openStory('july')">
                <div class="timeline-dot"></div>
                <h3 class="font-bold text-primary text-2xl">JULY 2025</h3>
                <div class="timeline-content-box">
                    <p class="text-dark/80 leading-relaxed italic">The month you made the first move HAHAHAHAHAHA...</p>
                </div>
            </div>

            <div class="timeline-card" onclick="openStory('august')">
                <div class="timeline-dot"></div>
                <h3 class="font-bold text-primary text-2xl">AUGUST 2025</h3>
                <div class="timeline-content-box">
                    <p class="text-dark/80 leading-relaxed italic">The month I started courting you silently...</p>
                </div>
            </div>

            <div class="timeline-card" onclick="openStory('today')">
                <div class="timeline-dot"></div>
                <h3 class="font-bold text-primary text-2xl text-primary">Present</h3>
                <div class="timeline-content-box ring-2 ring-primary/20">
                    <p class="leading-relaxed font-bold text-primary">Still falling for you every day. ❤️</p>
                </div>
            </div>

        </div>
    </section>

    <div id="story-modal" class="modal-overlay" onclick="closeStory()">
        <div id="modal-card" class="modal-card animate-in zoom-in duration-300" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 id="modal-date" class="font-dancing text-4xl text-primary mb-1"></h3>
                    <p id="modal-subtitle" class="text-[10px] font-bold tracking-[0.2em] uppercase text-dark/40"></p>
                </div>
                <button onclick="closeStory()" class="text-primary font-bold text-lg">✕</button>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        // MUSIC LOGIC
        const music = document.getElementById('bg-music');
        const musicIcon = document.getElementById('music-icon');
        let hasStarted = false;

        function startMusic() {
            if (!hasStarted) {
                music.play().then(() => {
                    musicIcon.innerText = "⏸️";
                    hasStarted = true;
                    window.removeEventListener('scroll', startMusic);
                    window.removeEventListener('click', startMusic);
                }).catch(e => console.log("Waiting for user interaction..."));
            }
        }

        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicIcon.innerText = "⏸️";
            } else {
                music.pause();
                musicIcon.innerText = "🎵";
            }
        }

        window.addEventListener('scroll', startMusic);
        window.addEventListener('click', startMusic);

        // STORY DATA
        const storyData = {
            'july': {
                date: "JULY 2025",
                subtitle: "The Beginning",
                imgs: ["/US/1.jpg", "/US/2.jpg", "/US/3.jpg", "/US/4.jpg", "/US/5.jpg"],
                text: `<p>July will always be the month of my greatest risk in love. Even now, I wonder what would have happened if you didn't like my note back then. What would we be now if I hadn't reached out?</p>
                       <p>Kung bibigyan pa nga ako ng paulit ulit na chance kung irereach out kita sa time na to? Palagi kong gagawin without and hesitations, doubt, and second thought.</p>
                       <p>I still remember the time you accepted my follow request and follow me back in just a couple of minutes... nakaramdam agad ako ng pag asa nung time na yun HAHAHAHAH.</p>
                       <p>Again thanked you for accepting me and giving me a chance to prove myself, I'll always be thankful to Lord, for letting me see your name sa instagram.</p>`
            },
            'august': {
                date: "AUGUST 2025",
                subtitle: "The Courting",
                imgs: ["/FOODS/1.jpg", "/FOODS/2.jpg", "/FOODS/3.jpg"],
                text: `<p>From our first shared meals to realizing we shared the same soul. Those nights made me love you more.</p>
                       <p>It wasn't just about courting; it was about discovering the person I want to be with forever.</p>`
            },
            'today': {
                date: "Today",
                subtitle: "Always You",
                imgs: ["/YOURS/1.jpg", "/YOURS/2.jpg"],
                text: `<p>Every second spent with you is my favorite second. I'm so lucky you're mine.</p>
                       <p>I continue to choose you, today and every day after. You are the best plot twist in my life story. Mahal na mahal kita.</p>`
            }
        };

        function openStory(key) {
            const data = storyData[key];
            document.getElementById('modal-date').innerText = data.date;
            document.getElementById('modal-subtitle').innerText = data.subtitle;
            
            let photoDeckHtml = '<div class="photo-deck">';
            data.imgs.forEach((url, i) => {
                photoDeckHtml += `<div class="deck-photo" style="z-index: ${i}"><img src="${url}" alt="Memory"></div>`;
            });
            photoDeckHtml += '</div>';

            document.getElementById('modal-content').innerHTML = photoDeckHtml + data.text;
            document.getElementById('story-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            
            setTimeout(() => { document.getElementById('modal-card').classList.add('fan-active'); }, 50);
        }

        function closeStory() {
            document.getElementById('modal-card').classList.remove('fan-active');
            setTimeout(() => {
                document.getElementById('story-modal').style.display = 'none';
                document.body.style.overflow = 'auto';
            }, 300);
        }

        function goToGallery(type) { window.location.href = '/HTML/gallery.html?tab=' + type; }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = ['❤️', '💖', '🌸', '✨'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 15 + 15 + "px";
            heart.style.animationDuration = (Math.random() * 5 + 5) + "s";
            document.getElementById('heart-bg').appendChild(heart);
            setTimeout(() => { heart.remove(); }, 10000);
        }
        setInterval(createHeart, 600);

        window.onload = () => {
            setTimeout(() => {
                const finalText = document.getElementById('final-text');
                if (finalText) finalText.classList.replace('opacity-0', 'opacity-100');
            }, 5500);
        };
    </script>
</body>
</html>
